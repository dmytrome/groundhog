name: Conformance

# Scheduled, not per-push: the detector sites are external and rate-limited.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  antibot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Start the stealth browser
        run: docker compose up --build -d

      - name: Wait for CDP
        run: |
          for _ in $(seq 1 60); do
            curl -sf http://127.0.0.1:9222/json/version && exit 0
            sleep 2
          done
          echo "CDP never became ready" >&2
          exit 1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - run: pip install -r tests/requirements.txt

      - name: Run harness (retry external-site flakes)
        run: |
          ok=0
          for attempt in 1 2 3; do
            if python tests/antibot.py; then ok=1; break; fi
            echo "attempt $attempt failed; retrying"; sleep 5
          done
          [[ "$ok" == 1 ]]

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: conformance
          path: |
            RESULTS.md
            tests/report.html

  # Separate job so the write-scoped token is never present while the untrusted
  # container build / pip install / harness run in the antibot job.
  #
  # Pushes to a branch for a human to open/merge the PR rather than pushing to
  # protected main: it can't push there directly (requires the "test" check), can't
  # auto-merge (a bot PR never triggers that check — GitHub's recursion guard), and
  # can't even open the PR itself (Actions is disallowed from creating PRs on this
  # repo) — so this stops at the one step that reliably works, and a human takes it
  # from there. The content also includes text read from external sites, so a human
  # glance before merge is the right gate regardless.
  publish:
    needs: antibot
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: conformance
      - name: Push refreshed results to a branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RESULTS.md
          if git diff --cached --quiet; then
            echo "no changes to publish"
            exit 0
          fi
          BRANCH="bot/conformance-results"
          git checkout -B "$BRANCH"
          git commit -m "chore: refresh conformance results"
          git push -f origin "$BRANCH"
          {
            echo "### Conformance results ready"
            echo "[Open a PR for \`$BRANCH\`](https://github.com/${GITHUB_REPOSITORY}/pull/new/$BRANCH)"
          } >> "$GITHUB_STEP_SUMMARY"
