name: Conformance

# Scheduled, not per-push: the detector sites are external and rate-limited.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  antibot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Start the stealth browser
        run: docker compose up --build -d

      - name: Wait for CDP
        run: |
          for _ in $(seq 1 60); do
            curl -sf http://127.0.0.1:9222/json/version && exit 0
            sleep 2
          done
          echo "CDP never became ready" >&2
          exit 1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - run: pip install -r tests/requirements.txt

      - name: Run harness (retry external-site flakes)
        run: |
          ok=0
          for attempt in 1 2 3; do
            if python tests/antibot.py; then ok=1; break; fi
            echo "attempt $attempt failed; retrying"; sleep 5
          done
          [[ "$ok" == 1 ]]

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: conformance
          path: |
            RESULTS.md
            tests/report.html

  # Separate job so the write-scoped token is never present while the untrusted
  # container build / pip install / harness run in the antibot job.
  publish:
    needs: antibot
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: conformance
      - name: Commit refreshed RESULTS.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RESULTS.md
          git diff --cached --quiet || git commit -m "chore: refresh conformance results [skip ci]"
          git push
