services:
  chrome:
    build: .
    image: chrome-cdp
    shm_size: 512m
    environment:
      - WINDOW_SIZE=1920,1080
      # Upstream proxy, e.g. http://user:pass@host:port. When set, the entrypoint
      # geolocates the exit IP and aligns TZ + locale to it (geo-coherence).
      - PROXY=${PROXY:-}
      # Fallback timezone when no proxy is set; with a proxy it is derived from
      # the exit IP's geo, so this is overridden.
      - TZ=${TZ:-UTC}
    # Optional GPU passthrough for an authentic hardware WebGL renderer (the
    # entrypoint auto-detects and switches flags). Without a GPU it runs Mesa
    # llvmpipe, a coherent software renderer. NVIDIA: uncomment `gpus` and set
    # NVIDIA_DRIVER_CAPABILITIES=all. Intel/AMD: uncomment `devices`.
    # gpus: all
    # devices:
    #   - /dev/dri:/dev/dri
    # Bound to localhost: the CDP endpoint is unauthenticated. To expose it to a
    # trusted private network, change to "0.0.0.0:9222:9222" deliberately.
    ports:
      - "127.0.0.1:9222:9222"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:9222/json/version"]
      interval: 20s
      timeout: 5s
      retries: 3

  # Public "try it" playground (paste a URL, see the safe markdown + provenance +
  # stripped threats). Talks to the `chrome` service over the compose network.
  demo:
    build:
      context: .
      dockerfile: demo/Dockerfile
    environment:
      - CDP_URL=http://chrome:9222
      - GROUNDHOG_AUTO_START_BROWSER=false
      - DEMO_RATE_LIMIT_PER_HOUR=${DEMO_RATE_LIMIT_PER_HOUR:-8}
      - DEMO_GLOBAL_RATE_LIMIT_PER_MINUTE=${DEMO_GLOBAL_RATE_LIMIT_PER_MINUTE:-20}
    depends_on:
      chrome:
        condition: service_healthy
    restart: unless-stopped

  # Reverse proxy + automatic Let's Encrypt TLS for the demo. Set DEMO_DOMAIN
  # (and optionally DEMO_EMAIL for the ACME account) in a .env file.
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DEMO_DOMAIN=${DEMO_DOMAIN:?set DEMO_DOMAIN to your demo's hostname}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - demo
    restart: unless-stopped

volumes:
  caddy_data:
